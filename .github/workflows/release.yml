name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Minecraft ${{ matrix.minecraft }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft:
          - "1.20.1"
          - "1.21.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod jar
        run: ./gradlew -PtargetMinecraft=${{ matrix.minecraft }} build

      - name: Stage release jar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          jar="$(find build/libs -maxdepth 1 -type f \
            -name "mc-transport-dialer-${{ matrix.minecraft }}-*.jar" \
            ! -name "*-sources.jar" | sort | head -n 1)"
          if [[ -z "$jar" ]]; then
            echo "No remapped jar found for Minecraft ${{ matrix.minecraft }}" >&2
            find build/libs -maxdepth 1 -type f -print >&2
            exit 1
          fi
          cp "$jar" "dist/$(basename "$jar")"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-transport-dialer-${{ matrix.minecraft }}
          path: dist/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${DISPATCH_TAG}"
            git ls-remote --exit-code --tags "https://github.com/${REPO}.git" "refs/tags/${tag}" >/dev/null || \
              gh api "repos/${REPO}/git/refs" \
                --method POST \
                -f ref="refs/tags/${tag}" \
                -f sha="${GITHUB_SHA}" >/dev/null
          fi

          mapfile -t jars < <(find release-assets -maxdepth 1 -type f -name "*.jar" | sort)
          if [[ "${#jars[@]}" -ne 2 ]]; then
            echo "Expected exactly 2 release jars, found ${#jars[@]}" >&2
            find release-assets -maxdepth 2 -type f -print >&2
            exit 1
          fi

          if ! gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$REPO" \
              --title "MC Transport Dialer ${tag}" \
              --notes "Fabric builds for Minecraft 1.20.1 and 1.21.1."
          fi
          gh release upload "$tag" "${jars[@]}" --repo "$REPO" --clobber
