# MC Transport Dialer — Server Config (MVP defaults)
#
# Server-side configuration. The server owns all route state and pushes a
# single loopback listener configuration to each player that joins.
# Operators configure routes at runtime with the `/mctransport set|unset`
# command; do NOT add routes by editing this file — edits made while the
# server is running will not take effect until restart.

enabled = true

# Fabric networking channel used to carry internal frames between the
# client and server mods. Both sides MUST match.
channel_name = "mctransport:main"

# Per-player stream concurrency cap. OPEN frames beyond this limit are
# answered with ERROR.
max_streams_per_player = 64

# Maximum bytes buffered for a single stream before backpressure pauses the
# target socket read.
stream_buffer_size = 1048576

# Maximum bytes buffered across all streams for a single player session
# before further DATA frames are paused.
global_buffer_size_per_player = 33554432

# Idle seconds before a session is closed and all of its streams are torn
# down. Independent of Minecraft keepalive.
idle_timeout_seconds = 300

# Connect timeout when dialing route.target_host:route.target_port.
connect_timeout_seconds = 10

log_level = "info"

# Example route entry. The bundled config is valid on first start; replace
# with values from the operator workflow or remove the block before
# deploying.
[[routes]]
player_uuid = "00000000-0000-0000-0000-000000000000"
player_name = "ExamplePlayer"
listen_port = 25580
target_host = "127.0.0.1"
target_port = 10000