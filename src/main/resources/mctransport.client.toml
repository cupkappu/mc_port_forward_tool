# MC Transport Dialer — Client Config (MVP defaults)
#
# This config drives the client-side Fabric mod. It only controls the local
# TCP intake; it does not configure any proxy protocol or target dialing on
# the server side.

enabled = true

# Local TCP listener address. External proxy tools should forward their
# outbound TCP traffic to this address.
listen_host = "127.0.0.1"
listen_port = 25580

# Fabric networking channel used to carry encrypted internal frames between
# the client and server mods. Both sides MUST match.
channel_name = "mctransport:main"

# Pre-shared secret used by the PSK AEAD cipher. Replace "change-me" with a
# long random string shared with the server mod. This value is read once at
# startup and must never be logged.
psk = "change-me"

# Per-client stream concurrency cap. OPEN frames beyond this limit are
# rejected by the server and refused by the local listener.
max_streams = 64

# Maximum bytes buffered for a single stream before backpressure pauses the
# local socket read.
stream_buffer_size = 1048576

# Maximum bytes buffered across all streams for this client session before
# further DATA frames are paused.
global_buffer_size = 33554432

log_level = "info"
